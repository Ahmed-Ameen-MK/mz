<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم القنوات الرياضية — MZ TV</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../icon.png" type="image/png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="admin-header">
  <div class="admin-header__inner">
    <a href="../index.html" class="brand">
      <span class="brand__mark">MZ</span>
      <span>MZ <span class="brand__tv">TV</span></span>
    </a>
    <a href="../channels/sports.html" class="btn btn--ghost">عرض صفحة القنوات ←</a>
  </div>
</header>

<main class="admin-shell">
  <h1>إدارة القنوات الرياضية</h1>
  <p class="section__desc">أضف قناة جديدة أو عدّل/احذف قناة موجودة. التغييرات تظهر فورًا في صفحة القنوات الرياضية للزوّار.</p>

  <form class="admin-form" id="channelForm">
    <h2 id="channelFormTitle">نشر قناة جديدة</h2>
    <input type="hidden" id="channelId" value="">

    <div class="form-row">
      <label class="form-field">
        <span>اسم القناة</span>
        <input type="text" id="channelName" required placeholder="مثال: beIN Sports 1 HD">
      </label>
      <label class="form-field">
        <span>القسم</span>
        <select id="channelTypeSelect" required></select>
      </label>
    </div>

    <div class="form-row" id="newTypeRow" style="display:none;">
      <label class="form-field">
        <span>اسم القسم الجديد</span>
        <input type="text" id="channelTypeNew" placeholder="مثلاً: تركي">
      </label>
    </div>

    <div class="form-row">
      <label class="form-field">
        <span>رابط بث 1 (اختياري)</span>
        <input type="url" id="channelStream1" placeholder="https://example.com/stream1">
      </label>
      <label class="form-field">
        <span>رابط بث 2 (اختياري)</span>
        <input type="url" id="channelStream2" placeholder="https://example.com/stream2">
      </label>
    </div>

    <div class="form-row">
      <label class="form-field">
        <span>رابط بث 3 (اختياري)</span>
        <input type="url" id="channelStream3" placeholder="https://example.com/stream3">
      </label>
      <label class="form-field">
        <span>رمز تضمين يوتيوب (اختياري)</span>
        <input type="text" id="channelYoutubeCode" placeholder="مثال: dQw4w9WgXcQ أو live_stream?channel=UCxxxx">
      </label>
    </div>

    <p style="color:var(--text-faint); font-size:.8rem; margin-bottom:1.1rem;">* لازم رابط بث واحد على الأقل (بث 1 / بث 2 / بث 3) أو رمز تضمين يوتيوب.</p>

    <div class="form-row">
      <label class="form-field">
        <span>رابط أيقونة القناة (اختياري)</span>
        <input type="url" id="channelAvatarUrl" placeholder="https://example.com/logo.png">
      </label>
    </div>

    <div class="form-msg" id="channelFormMsg"></div>

    <div class="admin-form__actions">
      <button type="submit" class="btn btn--primary" id="channelSubmitBtn">نشر القناة</button>
      <button type="button" class="btn btn--ghost" id="channelCancelEditBtn" style="display:none;">إلغاء التعديل</button>
    </div>
  </form>

  <div class="admin-table-wrap">
    <table class="admin-table" id="channelsTable">
      <thead>
        <tr>
          <th>الأيقونة</th>
          <th>اسم القناة</th>
          <th>القسم</th>
          <th>مصادر البث</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="channelsTableBody">
        <tr><td colspan="5" class="matches__loading">جارِ التحميل…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/admin-channels.js"></script>
</body>
</html>
