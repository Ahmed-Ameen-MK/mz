<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — MZ TV</title>
<link rel="icon" href="../icon.png" type="image/png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="split-auth">
  <div class="split-auth__form">
    <div class="auth-card2 reveal-scale is-visible">
      <a href="../index.html" class="brand" style="margin-bottom:2rem; display:flex;">
        <span class="brand__mark">MZ</span>
        <span>MZ <span class="brand__tv">TV</span></span>
      </a>
      <span class="eyebrow">◆ مرحبًا بعودتك</span>
      <h1>تسجيل الدخول</h1>
      <p class="sub">سجّل الدخول بحساب جوجل في ثوانٍ لمتابعة فرقك المفضلة وحفظ إعداداتك.</p>

      <p class="form-msg" id="loginMsg"></p>

      <button class="btn btn--google" type="button" id="googleLoginBtn">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        <span id="googleLoginLabel">المتابعة عبر جوجل</span>
      </button>

      <p class="switch">ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
    </div>
  </div>

  <div class="split-auth__visual" aria-hidden="true">
    <img src="../bgs/login.png" alt="">
    <div class="split-auth__caption">
      <div class="split-auth__brand">
        <span class="brand__mark">MZ</span>
        <span>MZ <span class="brand__tv">TV</span></span>
      </div>
      <div class="split-auth__marquee">
        <div class="split-auth__marquee-track">
          <span>شاهد MZ TV</span>
          <span>كل المباريات في مكان واحد</span>
          <span>القنوات الفضائية</span>
          <span>أفلام</span>
          <span>مسلسلات</span>
          <span>شاهد MZ TV</span>
          <span>كل المباريات في مكان واحد</span>
          <span>القنوات الفضائية</span>
          <span>أفلام</span>
          <span>مسلسلات</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    const msg = document.getElementById('loginMsg');
    const btn = document.getElementById('googleLoginBtn');
    const label = document.getElementById('googleLoginLabel');
    msg.textContent = '';
    msg.className = 'form-msg';
    btn.disabled = true;
    label.textContent = 'جارِ التحويل إلى جوجل...';
    try {
      await mzAuth.loginWithGoogle();
    } catch (err) {
      msg.textContent = 'تعذّر بدء تسجيل الدخول عبر جوجل';
      msg.className = 'form-msg form-msg--error';
      btn.disabled = false;
      label.textContent = 'المتابعة عبر جوجل';
    }
  });
</script>
</body>
</html>
